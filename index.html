<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akara HR System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <img src="assets/logo.png" alt="Akara Resources" class="login-logo">
    <div class="login-title">HR Management System</div>
    <div class="login-sub">กรุณาเข้าสู่ระบบด้วยบัญชีบริษัท</div>
    <form id="loginForm">
      <input id="loginEmail" type="email" placeholder="อีเมลบริษัท" class="login-input" required>
      <input id="loginPassword" type="password" placeholder="รหัสผ่าน" class="login-input" required>
      <button type="submit" class="btn-primary w-full">เข้าสู่ระบบ</button>
    </form>
    <div class="login-links">ยังไม่มีบัญชี? <a href="#" id="showSignup">สมัครใช้งาน</a></div>
    <form id="signupForm" style="display:none;">
      <input id="signupName" type="text" placeholder="ชื่อ-นามสกุล" class="login-input" required>
      <input id="signupEmail" type="email" placeholder="อีเมลบริษัท" class="login-input" required>
      <input id="signupPassword" type="password" placeholder="รหัสผ่าน (อย่างน้อย 6 ตัว)" class="login-input" required>
      <button type="submit" class="btn-primary w-full">สมัครใช้งาน</button>
    </form>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell" class="app-shell" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/logo.png" alt="Akara Resources" class="sidebar-logo">
      <div class="sidebar-product">HR System</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">หลัก</div>
      <a class="nav-item active" data-page="dashboard">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" data-page="employees">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>พนักงาน</span>
        <span class="nav-count" id="empNavCount"></span>
      </a>
      <a class="nav-item" data-page="movements">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4 4 4M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
        <span>Staff Movement</span>
        <span class="nav-badge" id="movNavBadge" style="display:none;"></span>
      </a>
      <div class="nav-section">รายงาน</div>
      <a class="nav-item" data-page="headcount">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Headcount Report</span>
      </a>
      <a class="nav-item" data-page="analytics">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        <span>Analytics</span>
      </a>
      <a class="nav-item" data-page="payroll">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>รายงานเงินเดือน</span>
      </a>
      <div class="nav-section" id="adminNavSection" style="display:none;">ระบบ</div>
      <a class="nav-item" data-page="users" id="usersNavItem" style="display:none;">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>จัดการผู้ใช้</span>
      </a>
      <a class="nav-item" data-page="settings" id="settingsNavItem" style="display:none;">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar"></div>
        <div class="user-info">
          <div class="user-name" id="sidebarName"></div>
          <div class="user-role" id="sidebarRole"></div>
        </div>
        <button class="logout-btn" id="logoutBtn" title="ออกจากระบบ">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- PAGES -->
  <main class="main-content">
    <div id="pageDashboard"  class="page active"></div>
    <div id="pageEmployees" class="page"></div>
    <div id="pageMovements" class="page"></div>
    <div id="pageHeadcount" class="page"></div>
    <div id="pageAnalytics" class="page"></div>
    <div id="pagePayroll"   class="page"></div>
    <div id="pageUsers"     class="page"></div>
    <div id="pageSettings"  class="page"></div>
  </main>
</div>

<div id="toastContainer" class="toast-container"></div>
<div id="modalPortal"></div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- SheetJS for Excel import/export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module" src="js/supabase-config.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
